<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <style>
        .text-container {
            margin-top: 15px;
            color: #333; /* ලෝගෝ එකට ගැලපෙන පාටක් */
            font-family: 'Georgia', serif; /* ඔරිජිනල් ෆොන්ට් එකට ළඟ එකක් */
            text-align: center;
            opacity: 0;
            /* මෙතන 0.5s දැම්මම ගොඩක් වේගයෙන් අකුරු මැවෙනවා */
            animation: fadeInText 0.8s ease-in forwards; 
            animation-delay: 0.5s; 
        }
        
        .main-title { font-size: 28px; letter-spacing: 2px; margin: 0; }
        .sub-title { font-size: 16px; font-style: italic; margin-top: 5px; }

        @keyframes fadeInText {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="fullscreen-bg"></div>
    
    <div class="logo-container">
        <img src="logo.png" id="logo" alt="TEPRAAS Sigiriya">
        
        <div class="text-container">
            <h1 class="main-title">TEPRAAS SIGIRIYA</h1>
            <p class="sub-title">Where Nature Meets Tranquility</p>
        </div>
    </div>

    <script>
        // තත්පර 2.5කින් මෙනු එකට යන විදිහට සෙට් කළා (පරක්කුව අඩුයි)
        setTimeout(() => {
            window.location.href = "menu.html";
        }, 2500);
    </script>
</body>
</html>
