<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEPRAAS SIGIRIYA | Menu</title>
    <link rel="icon" type="image/png" href="logo2.png">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            font-family: 'Lato', sans-serif; 
            background-image: url('bg.jpg'); 
            background-size: cover; 
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container { width: 90%; max-width: 500px; text-align: center; padding: 40px 0; }

        header img { width: 100%; max-width: 300px; height: auto; }
        .header-tagline { font-family: 'Playfair Display', serif; font-size: 14px; color: #6B4E2D; margin: 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .divider { width: 60%; height: 1px; background: #2C2620; margin: 20px auto; opacity: 0.5; }

        /* පිරිසිදු පෙනුම */
        .category-box { margin-bottom: 25px; }
        .category-header { 
            display: flex; justify-content: center; align-items: center;
            font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; 
            cursor: pointer; color: #46583E; padding: 10px 0;
        }
        
        .toggle-icon { font-size: 24px; transition: transform 0.3s; }
        .category-box.active .toggle-icon { transform: rotate(45deg); }

        .item-list { display: none; margin-top: 5px; }
        .category-box.active .item-list { display: block; }
        
        /* Items මැදට - කලින් තිබ්බ විදිහට */
        .item-row { 
            display: flex; justify-content: center; gap: 20px; 
            padding: 8px 0; font-size: 16px; color: #2C2620;
        }
        .price { font-weight: bold; color: #BD8A3F; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="logo2.png" alt="Tepraas Logo">
        <p class="header-tagline">Authentic Sri Lankan Flavors</p>
        <div class="divider"></div>
    </header>

    <div id="menu-content"></div>
</div>

<script>
    fetch('data.json').then(res => res.json()).then(data => {
        const container = document.getElementById('menu-content');
        data.categories.forEach(cat => {
            container.innerHTML += `
                <div class="category-box">
                    <div class="category-header" onclick="this.parentElement.classList.toggle('active')">
                        <span>${cat.name}</span>
                        <span class="toggle-icon">+</span>
                    </div>
                    <div class="item-list">
                        ${cat.items.map(i => `
                            <div class="item-row">
                                <span>${i.name}</span>
                                <span class="price">Rs. ${i.price}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        });
    });
</script>

</body>
</html>
